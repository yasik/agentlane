[project]
name = "agentlane-cli"
version = "0.2.0"
description = "CLI utilities for AgentLane"
requires-python = ">=3.12"
dependencies = ["rich>=13.0.0"]

[project.scripts]
agentlane = "agentlane_cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentlane_cli"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
