[project]
name = "agentlane-transport"
version = "0.1.0"
description = "Transport adapters for AgentLane runtimes"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.8.0,<3.0.0",
  "protobuf>=5.29.0,<6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentlane_transport"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
