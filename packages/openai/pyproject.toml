[project]
name = "agentlane-openai"
version = "0.3.0"
description = "OpenAI Responses API client utilities for AgentLane"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "agentlane",
  "openai>=1.68.2",
  "pydantic>=2.10.0,<3.0.0",
  "structlog>=25.1.0,<26.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentlane_openai"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
