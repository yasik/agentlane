[project]
name = "agentlane-braintrust"
version = "0.3.0"
description = "Braintrust tracing processor for AgentLane"
requires-python = ">=3.12"
dependencies = [
  "agentlane",
  "braintrust>=0.0.168",
  "structlog>=25.1.0,<26.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentlane_braintrust"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
