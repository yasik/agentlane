[project]
name = "agentlane-litellm"
version = "0.3.0"
description = "LiteLLM client utilities for AgentLane"
requires-python = ">=3.12"
dependencies = [
  "agentlane",
  "litellm>=1.71.1",
  "pydantic>=2.10.0,<3.0.0",
  "structlog>=25.1.0,<26.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentlane_litellm"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
